<!DOCTYPE html>
<html>
<head>
  <title>Secure Login Demo</title>
  <script>
    async function hashPassword() {
      const password = document.getElementById("password").value;

      const encoder = new TextEncoder();
      const data = encoder.encode(password);

      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

      document.getElementById("output").innerText =
        "Hashed Password (SHA-256): " + hashHex;
    }
  </script>
  <style>
    body { font-family: Arial; background:#f2f2f2; text-align:center; }
    .box { margin:100px auto; padding:20px; width:350px; background:white; border-radius:10px; }
    input { width:90%; padding:10px; margin:10px; }
    button { padding:10px 20px; background:#007bff; color:white; border:none; }
  </style>
</head>

<body>
  <div class="box">
    <h2>Secure Login</h2>

    <input type="text" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>

    <button onclick="hashPassword()">Login</button>

    <p id="output"></p>

    <hr>
    <p><b>Security:</b> Password is hashed using SHA-256 before processing.</p>
  </div>
</body>
</html>
