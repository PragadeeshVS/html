<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureBank | Login</title>

<style>
  :root{
    --bg1:#0f172a; --bg2:#1e293b; --card:#0b1220;
    --accent:#22c55e; --accent2:#3b82f6; --muted:#94a3b8; --text:#e5e7eb;
    --danger:#ef4444;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;
    color:var(--text);
    background:
      radial-gradient(1200px 600px at 10% -10%, #1d4ed8 0%, transparent 60%),
      radial-gradient(1000px 600px at 110% 10%, #16a34a 0%, transparent 60%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    min-height:100vh; display:grid; place-items:center;
  }
  .wrap{
    width:100%; max-width:420px; padding:20px;
  }
  .brand{
    display:flex; align-items:center; gap:10px; margin-bottom:16px;
  }
  .logo{
    width:42px; height:42px; border-radius:12px;
    background:linear-gradient(135deg, var(--accent2), var(--accent));
    display:grid; place-items:center; font-weight:800; color:#06121f;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  .brand h1{font-size:20px; margin:0; letter-spacing:.4px}
  .card{
    background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px; padding:22px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .card h2{margin:0 0 14px 0; font-size:22px}
  .field{margin-bottom:12px}
  .label{font-size:12px; color:var(--muted); margin-bottom:6px}
  .input{
    width:100%; padding:12px 14px; border-radius:12px;
    border:1px solid rgba(255,255,255,.08);
    background:#020617; color:var(--text);
    outline:none; transition:.2s border, .2s box-shadow;
  }
  .input:focus{
    border-color:rgba(59,130,246,.6);
    box-shadow:0 0 0 3px rgba(59,130,246,.15);
  }
  .row{
    display:flex; align-items:center; justify-content:space-between;
    font-size:12px; color:var(--muted); margin:6px 0 10px;
  }
  .btn{
    width:100%; padding:12px 14px; border-radius:12px;
    border:none; cursor:pointer; font-weight:600; letter-spacing:.3px;
    background:linear-gradient(135deg, var(--accent2), var(--accent));
    color:#06121f; box-shadow:0 10px 25px rgba(0,0,0,.4);
    transition: transform .05s ease, filter .2s ease;
  }
  .btn:active{transform:translateY(1px)}
  .btn:hover{filter:brightness(1.05)}
  .msg{
    margin-top:12px; font-size:12px; line-height:1.5;
    color:#a7f3d0; background:rgba(34,197,94,.08);
    border:1px dashed rgba(34,197,94,.3);
    padding:10px; border-radius:12px; word-break:break-all;
  }
  .footer{
    margin-top:12px; font-size:12px; color:var(--muted); text-align:center;
  }
  .pill{
    display:inline-block; padding:2px 8px; border-radius:999px;
    border:1px solid rgba(255,255,255,.12); margin-left:6px;
  }
  .danger{color:var(--danger)}
</style>

<script>
  async function hashPassword() {
    const password = document.getElementById("password").value;
    if (!password) {
      document.getElementById("output").innerText = "Please enter a password.";
      return;
    }

    const encoder = new TextEncoder();
    const data = encoder.encode(password);

    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

    document.getElementById("output").innerText =
      "SHA-256 (client-side): " + hashHex;
  }
</script>
</head>

<body>
  <div class="wrap">
    <div class="brand">
      <div class="logo">SB</div>
      <h1>SecureBank</h1>
      <span class="pill">Demo</span>
    </div>

    <div class="card">
      <h2>Sign in</h2>

      <div class="field">
        <div class="label">Username</div>
        <input class="input" type="text" placeholder="admin">
      </div>

      <div class="field">
        <div class="label">Password</div>
        <input id="password" class="input" type="password" placeholder="••••••••">
      </div>

      <div class="row">
        <span>Remember me</span>
        <span>Forgot password?</span>
      </div>

      <button class="btn" onclick="hashPassword()">Login</button>

      <div id="output" class="msg">
        Password is hashed in the browser before processing.
      </div>

      <div class="footer">
        Security: Client-side hashing <b>SHA-256</b>
        <span class="pill">IDS Monitored</span>
      </div>
    </div>
  </div>
</body>
</html>
